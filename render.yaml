services:
  - type: web
    name: ai-pdf-chatbot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://frontend-lime-three-65.vercel.app,http://localhost:5173
      - key: PYTHON_VERSION
        value: 3.11.0
